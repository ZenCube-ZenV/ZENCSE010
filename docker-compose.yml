version: "3.9"

services:
  mongodb:
    image: mongo:7.0
    container_name: certshield-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build: ./backend
    container_name: certshield-backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    depends_on:
      - mongodb
    volumes:
      - ./backend/keys:/app/keys

volumes:
  mongo_data:
